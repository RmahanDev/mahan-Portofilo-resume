                        <h2 class="title title--h2">فرم تماس با من</h2>

                        <form id="contact-form" class="contact-form" data-toggle="validator">
                            <div class="row">
                                <div class="form-group col-12 col-md-6">
                                    <input type="text" class="input form-control" id="nameContact" name="nameContact" placeholder="نام و نام خانوادگی" required="required" autocomplete="on" oninvalid="setCustomValidity('لطفا نام و نام خانوادگی خود را وارد کنید.')" onkeyup="setCustomValidity('')">
                                    <div class="help-block with-errors"></div>
                                </div>

                                <div class="form-group col-12 col-md-6">
                                    <input type="email" class="input form-control" id="emailContact" name="emailContact" placeholder="ایمیل" required="required" autocomplete="on" oninvalid="setCustomValidity('ایمیل نادرست است.')" onkeyup="setCustomValidity('')">
                                    <div class="help-block with-errors"></div>
                                </div>

                                <div class="form-group col-12 col-md-12">
                                    <input type="text" class="input form-control" id="phoneContact" name="phoneContact" placeholder="شماره موبایل" autocomplete="on">
                                </div>

                                <div class="form-group col-12 col-md-12">
                                    <input type="text" class="input form-control" id="subjectContact" name="subjectContact" placeholder="موضوع پیام" required="required" autocomplete="on" oninvalid="setCustomValidity('لطفا موضوع پیام را وارد کنید.')" onkeyup="setCustomValidity('')">
                                    <div class="help-block with-errors"></div>
                                </div>

                                <div class="form-group col-12 col-md-12">
                                    <textarea class="textarea form-control" id="messageContact" name="messageContact" placeholder="پیام..." rows="4" required="required" oninvalid="setCustomValidity('لطفا پیام خود را وارد کنید.')" onkeyup="setCustomValidity('')"></textarea>
                                    <div class="help-block with-errors"></div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-12 col-md-6 order-2 order-md-1 text-center text-md-start">
                                    <div id="validator-contact" class="hidden"></div>
                                </div>

                                <div class="col-12 col-md-6 order-1 order-md-2 text-end">
                                    <button type="submit" class="btn"><i class="font-icon icon-send"></i> ارسال پیام</button>
                                </div>
                            </div>
                        </form>

    <script>
        document.getElementById('contact-form').addEventListener('submit', function (e) {
            e.preventDefault();

            const name = document.getElementById('nameContact').value.trim();
            const email = document.getElementById('emailContact').value.trim();
            const phone = document.getElementById('phoneContact').value.trim();
            const subject = document.getElementById('subjectContact').value.trim();
            const message = document.getElementById('messageContact').value.trim();

            const fullSubject = subject || 'پیام جدید از فرم تماس سایت';
            const body =
                'نام: ' + name + '\n' +
                'ایمیل: ' + email + '\n' +
                'شماره موبایل: ' + (phone || '-') + '\n\n' +
                'پیام:\n' + message;

            const gmailUrl =
                'https://mail.google.com/mail/?view=cm&fs=1&to=' + encodeURIComponent('mahan@co.shainika.com') +
                '&su=' + encodeURIComponent(fullSubject) +
                '&body=' + encodeURIComponent(body);

            window.open(gmailUrl, '_blank');
        });
    </script>
